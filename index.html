var state={user:null,authUser:null,authLoading:true,authError:"",expenses:[],settlements:[],recurrings:[],cats:[],budgets:{},wealth:{},wAccounts:{},wTargets:{},tab:"add",month:getMonthKey(new Date()),loading:true};

function getMonthKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function prevMonth(mk){var p=mk.split("-"),y=+p[0],m=+p[1];m--;if(m<1){m=12;y--;}return y+"-"+String(m).padStart(2,"0");}

// ══════════════════════════════════════════════════════════════
// CUMULATIVE BUDGET — CORRECT FORMULA
// current_month_budget = monthly_setting + (prev_month_budget - prev_month_usage)
// Base case: first month with ANY expense data → just monthly_setting
// ══════════════════════════════════════════════════════════════
var _cumCache={};
function getCumBudget(user, mk, catId) {
  var key=user+"|"+mk+"|"+catId;
  if(_cumCache[key]!==undefined) return _cumCache[key];
  var budget=state.budgets[user]||DEFAULT_BUDGET;
  var bItem=budget.find(function(b){return b.cat===catId;});
  var monthly=bItem?bItem.monthly:0;
  if(monthly===0){_cumCache[key]=0;return 0;}

  // Find the earliest month that has any expenses
  var earliestMk=null;
  state.expenses.forEach(function(e){
    if(e.entryType==="income") return;
    var emk=getMonthKey(new Date(e.date));
    if(!earliestMk||emk<earliestMk) earliestMk=emk;
  });

  // If this month is at or before the earliest data month, base case = monthly
  if(!earliestMk||mk<=earliestMk){_cumCache[key]=monthly;return monthly;}

  // Recursive: current = monthly + (prev_budget - prev_usage)
  var pm=prevMonth(mk);
  var prevBudget=getCumBudget(user,pm,catId);
  var prevUsage=getMonthCatSpend(user,pm,catId);
  var result=monthly+(prevBudget-prevUsage);
  _cumCache[key]=result;
  return result;
}

function getMonthCatSpend(user,mk,catId){
  var t=0;state.expenses.forEach(function(e){if(getMonthKey(new Date(e.date))!==mk||e.entryType==="income"||e.category!==catId)return;if(e.type==="personal"&&e.addedBy!==user)return;t+=e.type==="personal"?e.amount:e.myShare;});return t;
}
function getMonthTotalSpend(user,mk){
  var t=0;state.expenses.forEach(function(e){if(getMonthKey(new Date(e.date))!==mk||e.entryType==="income")return;if(e.type==="personal"&&e.addedBy!==user)return;t+=e.type==="personal"?e.amount:e.myShare;});return t;
}

// ── SVG Area Chart helper (stacked, multi-series, like screenshot) ──
function svgAreaChart(chartData, accounts, filter) {
  var W=500, H=160, padL=8, padR=8, padT=18, padB=22;
  var innerW=W-padL-padR, innerH=H-padT-padB;
  var n=chartData.length;
  if(n<2) return '';

  // Determine series: if filter=all and multiple accounts, stacked; else single
  var isSingle=(filter!=="all"||accounts.length===1);
  var seriesColors=["#1e3a5f","#7c3aed","#16a34a","#0d9488","#f59e0b","#ec4899"];
  var AREA_ALPHA=["0.75","0.55","0.40","0.30","0.22","0.16"];

  // Build data values
  var maxVal=1;
  chartData.forEach(function(d){
    var v=filter==="all"?d.total:(d[filter]||0);
    if(v>maxVal)maxVal=v;
  });

  function xPos(i){return padL+innerW*(i/(n-1));}
  function yPos(v){return padT+innerH*(1-v/maxVal);}

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;overflow:visible">';

  // Grid lines (3 horizontal)
  for(var g=0;g<=2;g++){
    var gy=padT+innerH*(g/2);
    var gval=maxVal*(1-g/2);
    svg+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="#e8e5e0" stroke-width="1"/>';
    svg+='<text x="'+(W-padR+2)+'" y="'+(gy+3).toFixed(1)+'" font-size="8" fill="#bbb" text-anchor="start">'+Math.round(gval/1000)+'k</text>';
  }

  if(isSingle){
    // Single area: filled with gradient
    var seriesId=filter==="all"?null:filter;
    var color=seriesId?ACCOLORS[accounts.findIndex(function(a){return a.id===seriesId;})%ACCOLORS.length]:"#1e3a5f";
    var gradId="ag0";
    svg+='<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.5"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0.05"/></linearGradient></defs>';
    var pts=chartData.map(function(d,i){return xPos(i).toFixed(1)+','+yPos(filter==="all"?d.total:(d[filter]||0)).toFixed(1);}).join(' ');
    var fillPts=xPos(0).toFixed(1)+','+(padT+innerH)+' '+pts+' '+xPos(n-1).toFixed(1)+','+(padT+innerH);
    svg+='<polygon points="'+fillPts+'" fill="url(#'+gradId+')" />';
    svg+='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    // Dots at each data point
    chartData.forEach(function(d,i){
      var v=filter==="all"?d.total:(d[filter]||0);
      svg+='<circle cx="'+xPos(i).toFixed(1)+'" cy="'+yPos(v).toFixed(1)+'" r="3" fill="'+color+'" stroke="white" stroke-width="1.5"/>';
    });
  } else {
    // Stacked area chart for "all combined"
    // Build stacked values per data point
    var stacked=chartData.map(function(d){
      var cum=0,layers=[];
      accounts.forEach(function(a,idx){
        var v=d[a.id]||0;
        layers.push({bot:cum,top:cum+v,color:seriesColors[idx%seriesColors.length],alpha:AREA_ALPHA[idx%AREA_ALPHA.length]});
        cum+=v;
      });
      return layers;
    });
    // Draw from bottom layer to top (reverse for visual stacking)
    for(var ai=accounts.length-1;ai>=0;ai--){
      var color2=seriesColors[ai%seriesColors.length];
      var gradId2="ag"+ai;
      svg+='<defs><linearGradient id="'+gradId2+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color2+'" stop-opacity="0.7"/><stop offset="100%" stop-color="'+color2+'" stop-opacity="0.1"/></linearGradient></defs>';
      var topPts=chartData.map(function(d,i){return xPos(i).toFixed(1)+','+yPos(stacked[i][ai].top).toFixed(1);}).join(' ');
      var botPts=chartData.map(function(d,i){return xPos(n-1-i).toFixed(1)+','+yPos(stacked[n-1-i][ai].bot).toFixed(1);}).join(' ');
      svg+='<polygon points="'+topPts+' '+botPts+'" fill="url(#'+gradId2+')" />';
      svg+='<polyline points="'+topPts+'" fill="none" stroke="'+color2+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    }
    // Dots on total line
    chartData.forEach(function(d,i){
      svg+='<circle cx="'+xPos(i).toFixed(1)+'" cy="'+yPos(d.total).toFixed(1)+'" r="3" fill="#1e3a5f" stroke="white" stroke-width="1.5"/>';
    });
  }

  // X-axis labels
  chartData.forEach(function(d,i){
    // Show every label if <=8 points, else alternate
    if(n<=8||i%Math.ceil(n/8)===0||i===n-1){
      svg+='<text x="'+xPos(i).toFixed(1)+'" y="'+(H-3)+'" font-size="9" fill="#999" text-anchor="middle">'+d.label+'</text>';
    }
  });

  svg+='</svg>';

  // Legend for stacked view
  var legend='';
  if(!isSingle&&accounts.length>1){
    legend='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">';
    accounts.forEach(function(a,idx){
      legend+='<div style="display:flex;align-items:center;gap:4px;font-size:10px"><span style="width:10px;height:10px;border-radius:2px;background:'+seriesColors[idx%seriesColors.length]+';display:inline-block"></span>'+a.icon+' '+a.label+'</div>';
    });
    legend+='</div>';
  }

  return svg+legend;
}

function svgPie(slices, size) {
  var r=size/2, cx=r, cy=r;
  var total=0; slices.forEach(function(s){total+=s.value;});
  if(total===0) return '<div style="text-align:center;color:var(--dim);font-size:12px">No data</div>';
  var svg='<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';
  var startAngle=-Math.PI/2;
  slices.forEach(function(s){
    if(s.value<=0) return;
    var sliceAngle=(s.value/total)*2*Math.PI;
    var endAngle=startAngle+sliceAngle;
    var largeArc=sliceAngle>Math.PI?1:0;
    var x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);

    } else {

    }

    var pieSlices=[];accounts.forEach(function(a,idx){var v=latest[a.id]||0;if(v>0)pieSlices.push({value:v,color:ACCOLORS[idx%ACCOLORS.length],label:a.label,icon:a.icon});});
    h+='<div class="card" style="margin-bottom:14px;padding:12px"><div style="font-size:12px;font-weight:700;margin-bottom:10px">Wealth distribution</div><div class="pie-wrap">';
    h+=svgPie(pieSlices,160);
    h+='<div class="pie-legend">';
    pieSlices.forEach(function(s){var pct=latestTotal>0?(s.value/latestTotal*100):0;h+='<div class="alloc-row"><span class="alloc-dot" style="background:'+s.color+'"></span><span style="color:#666;flex:1;min-width:80px">'+s.icon+' '+s.label+'</span><span style="font-family:var(--fm);font-weight:600;min-width:40px;text-align:right">'+pct.toFixed(0)+'%</span><span style="font-family:var(--fm);color:#999;font-size:10px;min-width:55px;text-align:right">'+fes(s.value)+'</span></div>';});
    h+='</div></div></div>';

    // ── Wealth growth AREA chart (stacked, like screenshot) ──
    if(chartData.length>1){
      h+='<div class="card" style="margin-bottom:14px;padding:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Wealth growth over time</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px"><button class="filter-btn'+(wealthFilter==="all"?" active":"")+'" onclick="wealthFilter=\'all\';renderTabContent()">All combined</button>';
      accounts.forEach(function(a){h+='<button class="filter-btn'+(wealthFilter===a.id?" active":"")+'" onclick="wealthFilter=\''+a.id+'\';renderTabContent()">'+a.icon+' '+a.label+'</button>';});
      h+='</div>';
      h+=svgAreaChart(chartData,accounts,wealthFilter);

      // Monthly changes
      h+='<div style="margin-top:12px;font-size:12px;font-weight:700;margin-bottom:6px">Monthly changes</div>';
      for(var i=chartData.length-1;i>=1&&i>=chartData.length-4;i--){var cur=wealthFilter==="all"?chartData[i].total:(chartData[i][wealthFilter]||0),prv=wealthFilter==="all"?chartData[i-1].total:(chartData[i-1][wealthFilter]||0),chg=cur-prv,cpct=prv>0?((chg/prv)*100):0;h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px"><span style="color:var(--dim)">'+chartData[i].label+'</span><span style="font-family:var(--fm);color:'+(chg>=0?"var(--green)":"var(--red)")+'">'+(chg>=0?"+":"")+fes(chg)+' ('+(cpct>=0?"+":"")+cpct.toFixed(1)+'%)</span></div>';}
      h+='</div>';
    }
  }

  // Add snapshot
  h+='<div style="margin-bottom:14px"><button class="submit-btn" style="background:var(--green)" onclick="showWealthForm()">+ Add snapshot</button></div><div id="wealth-form"></div>';

  // Detail table with FULL account names
  if(chartData.length>0){
    h+='<div class="card" style="padding:0;overflow:hidden"><div style="font-size:12px;font-weight:700;padding:12px 14px 8px">Monthly detail</div><div style="overflow-x:auto"><table><thead><tr style="background:#f8f7f5"><th>Month</th>';
    accounts.forEach(function(a){h+='<th style="text-align:right;font-size:10px;max-width:80px;white-space:normal">'+a.label+'</th>';});
    h+='<th style="text-align:right">Total</th><th style="text-align:right">Target</th><th style="text-align:right">Delta</th><th style="width:24px"></th></tr></thead><tbody>';
    chartData.forEach(function(r){h+='<tr style="border-bottom:1px solid #f0eeeb"><td>'+r.label+'</td>';accounts.forEach(function(a){h+='<td style="text-align:right;font-family:var(--fm)">'+fes(r[a.id]||0)+'</td>';});h+='<td style="text-align:right;font-family:var(--fm);font-weight:600">'+fes(r.total)+'</td><td style="text-align:right;font-family:var(--fm)">'+fes(r.target)+'</td><td style="text-align:right;font-family:var(--fm);color:'+(r.diff>=0?"var(--green)":"var(--red)")+';font-weight:600">'+(r.diff>=0?"+":"")+fes(r.diff)+'</td><td><button class="del-btn" style="width:20px;height:20px;font-size:11px" onclick="delWealth(\''+r.raw.month+'\')">\u00D7</button></td></tr>';});
    h+='</tbody></table></div></div>';
  }
  return h;
}
function showWealthForm(){var el=document.getElementById("wealth-form"),accounts=state.wAccounts[state.user]||DEFAULT_WACC;var h='<div class="card" style="padding:14px;margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Add / update snapshot</div><div class="field"><label>MONTH</label><input class="inp" type="month" id="w-month" value="'+getMonthKey(new Date())+'"></div>';accounts.forEach(function(a){h+='<div class="field"><label>'+a.icon+' '+a.label.toUpperCase()+'</label><input class="inp" type="number" id="w-'+a.id+'" placeholder="0"></div>';});h+='<div style="display:flex;gap:8px"><button class="submit-btn" style="flex:1" onclick="saveWealth()">Save</button><button class="submit-btn" style="flex:1;background:#94a3b8" onclick="document.getElementById(\'wealth-form\').innerHTML=\'\'">Cancel</button></div></div>';el.innerHTML=h;}
function saveWealth(){var month=document.getElementById("w-month").value;if(!month)return;var accounts=state.wAccounts[state.user]||DEFAULT_WACC,entry={month:month,values:{}};accounts.forEach(function(a){var el=document.getElementById("w-"+a.id);entry.values[a.id]=el?parseFloat(el.value)||0:0;});var w=state.wealth[state.user]||[],ex=w.findIndex(function(x){return x.month===month;});if(ex>=0)w[ex]=entry;else w.push(entry);state.wealth[state.user]=w;saveDoc("wlth-"+state.user,w);renderTabContent();}
function delWealth(mo){state.wealth[state.user]=(state.wealth[state.user]||[]).filter(function(x){return x.month!==mo;});saveDoc("wlth-"+state.user,state.wealth[state.user]);renderTabContent();}

// ══════════════════════════════════════════════════════════════
// SETTINGS TAB
// ══════════════════════════════════════════════════════════════
function renderSettingsTab(){
  var u=state.user,budget=state.budgets[u]||DEFAULT_BUDGET,totalBud=0;budget.forEach(function(b){totalBud+=b.monthly;});
  var wTargets=state.wTargets[u]||{yearEnd:50000,year:2026},wAccounts=state.wAccounts[u]||DEFAULT_WACC;
  var h='<h2 class="sec-title">Settings</h2><div style="font-size:12px;color:var(--dim);margin-bottom:16px">Editing as: '+u+'</div>';

  h+='<h3 class="sec-h">Year-end wealth target</h3><div class="card" style="padding:14px;margin-bottom:20px"><div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1"><div class="field"><label>YEAR</label><input class="inp" type="number" id="set-yr" value="'+(wTargets.year||2026)+'"></div></div><div style="flex:2"><div class="field"><label>TARGET (\u20AC)</label><input class="inp" type="number" id="set-yt" value="'+(wTargets.yearEnd||50000)+'" step="1000"></div></div></div><div style="font-size:11px;color:var(--dim);margin-bottom:8px">Monthly = (Target \u2212 Start wealth) \u00F7 12</div><button class="submit-btn" style="font-size:12px;padding:8px" onclick="saveTarget()">Save</button></div>';

  h+='<h3 class="sec-h">Wealth accounts</h3><div style="margin-bottom:20px">';
  wAccounts.forEach(function(a){h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0eeeb"><span style="font-size:13px">'+a.icon+' '+a.label+'</span><div style="display:flex;gap:4px"><button class="del-btn" style="font-size:10px;width:32px;height:24px;border-radius:6px" onclick="editWAccount(\''+a.id+'\')">Edit</button><button class="del-btn" style="width:24px;height:24px" onclick="delWAccount(\''+a.id+'\')">\u00D7</button></div></div>';});
  h+='<div class="card" style="padding:12px;margin-top:8px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add account</div><div style="display:flex;gap:6px"><input class="inp" id="wa-icon" style="width:50px;text-align:center" value="\u{1F4B0}"><input class="inp" id="wa-name" style="flex:1" placeholder="e.g. Scalable"><button class="submit-btn" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="addWAccount()">+</button></div></div></div>';

  h+='<h3 class="sec-h">Expense categories</h3>';
  GROUPS.forEach(function(g){var gc=state.cats.filter(function(c){return c.group===g.id;});if(!gc.length)return;h+='<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--dim);font-weight:600;margin-bottom:6px">'+g.label.toUpperCase()+'</div>';gc.forEach(function(c){h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0eeeb"><span style="font-size:13px">'+c.icon+' '+c.label+'</span><div style="display:flex;gap:4px"><button class="del-btn" style="font-size:10px;width:32px;height:24px;border-radius:6px" onclick="editCat(\''+c.id+'\')">Edit</button><button class="del-btn" style="width:24px;height:24px" onclick="delCat(\''+c.id+'\')">\u00D7</button></div></div>';});h+='</div>';});
  h+='<div class="card" style="padding:12px;margin-bottom:20px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add category</div><div style="display:flex;gap:6px;margin-bottom:8px"><input class="inp" id="nc-icon" style="width:50px;text-align:center" value="\u{1F4E6}"><input class="inp" id="nc-name" style="flex:1" placeholder="Name"><select class="inp" id="nc-group" style="width:100px"><option value="fix">Fixed</option><option value="variable" selected>Variable</option><option value="asset">Asset</option><option value="saving">Saving</option></select><button class="submit-btn" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="addCat()">+</button></div></div>';

  h+='<h3 class="sec-h">Monthly budget</h3><div class="card" style="padding:0;overflow:hidden;margin-bottom:14px"><table><thead><tr style="background:#f8f7f5"><th>Category</th><th style="text-align:right">Monthly</th><th style="text-align:right">%</th><th style="width:28px"></th></tr></thead><tbody>';
  budget.forEach(function(b){var c=state.cats.find(function(x){return x.id===b.cat;}),pct=totalBud>0?(b.monthly/totalBud*100):0;h+='<tr style="border-bottom:1px solid #f0eeeb"><td>'+(c?c.icon+" "+c.label:b.cat)+'</td><td style="text-align:right;padding:4px 10px"><input class="inp" type="number" value="'+b.monthly+'" onchange="updateBudget(\''+b.cat+'\',this.value)" style="width:80px;text-align:right;padding:4px 6px;font-size:12px" step="0.5"></td><td style="text-align:right;font-family:var(--fm);font-size:11px;color:var(--dim)">'+pct.toFixed(1)+'%</td><td><button class="del-btn" style="width:20px;height:20px;font-size:11px" onclick="updateBudget(\''+b.cat+'\',\'0\')">\u00D7</button></td></tr>';});
  h+='<tr style="background:#f8f7f5;font-weight:700"><td>Total</td><td style="text-align:right;font-family:var(--fm)">'+fe(totalBud)+'</td><td style="text-align:right;font-family:var(--fm);font-size:11px">100%</td><td></td></tr></tbody></table></div>';

  h+='<div class="card" style="padding:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add budget item</div><div style="display:flex;gap:6px;margin-bottom:8px"><select class="inp" id="bud-cat" style="flex:1" onchange="if(this.value){document.getElementById(\'bud-cat-free\').value=\'\';}"><option value="">Select existing...</option>';
  state.cats.filter(function(c){return!budget.some(function(b){return b.cat===c.id;});}).forEach(function(c){h+='<option value="'+c.id+'">'+c.icon+' '+c.label+'</option>';});
  h+='</select></div><div style="font-size:11px;color:var(--dim);margin-bottom:6px">Or type a new name:</div><div style="display:flex;gap:6px;margin-bottom:8px"><input class="inp" id="bud-cat-free" style="flex:1" placeholder="e.g. Pet expenses" oninput="if(this.value){document.getElementById(\'bud-cat\').value=\'\';}"><select class="inp" id="bud-cat-group" style="width:90px"><option value="fix">Fixed</option><option value="variable" selected>Variable</option><option value="asset">Asset</option><option value="saving">Saving</option></select></div><div style="display:flex;gap:6px"><input class="inp" id="bud-amt" type="number" style="width:100px;text-align:right" placeholder="Amount" step="0.5"><button class="submit-btn" style="flex:1;font-size:12px;padding:8px;margin-top:0" onclick="addBudgetItem()">Add budget item</button></div></div>';
  return h;
}

function saveTarget(){state.wTargets[state.user]={yearEnd:parseFloat(document.getElementById("set-yt").value)||0,year:parseInt(document.getElementById("set-yr").value)||2026};saveDoc("wtgt-"+state.user,state.wTargets[state.user]);renderTabContent();}
function updateBudget(catId,val){var amt=parseFloat(val)||0,budget=state.budgets[state.user]||[],ex=budget.findIndex(function(b){return b.cat===catId;});if(ex>=0){if(amt===0)budget.splice(ex,1);else budget[ex].monthly=amt;}else if(amt>0)budget.push({cat:catId,monthly:amt});state.budgets[state.user]=budget;saveDoc("bud-"+state.user,budget);_cumCache={};renderTabContent();}
function addBudgetItem(){var cat=document.getElementById("bud-cat").value,freeCat=document.getElementById("bud-cat-free").value.trim(),amt=document.getElementById("bud-amt").value;if(!amt)return;if(freeCat&&!cat){var grp=document.getElementById("bud-cat-group").value||"variable",existing=state.cats.find(function(c){return c.label.toLowerCase()===freeCat.toLowerCase();});if(existing)cat=existing.id;else{var newId=freeCat.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)+"_"+gid().slice(-3);state.cats.push({id:newId,label:freeCat,icon:"\u{1F4E6}",group:grp});saveDoc("cats",state.cats);cat=newId;}}if(cat&&amt)updateBudget(cat,amt);}
function editCat(id){var c=state.cats.find(function(x){return x.id===id;});if(!c)return;var ni=prompt("Icon/emoji for "+c.label+":",c.icon);if(ni===null)return;var nn=prompt("Category name:",c.label);if(nn===null)return;var ng=prompt("Group (fix/variable/asset/saving):",c.group);if(ng===null)ng=c.group;if(!["fix","variable","asset","saving"].includes(ng))ng=c.group;c.icon=ni||c.icon;c.label=nn.trim()||c.label;c.group=ng;saveDoc("cats",state.cats);renderTabContent();}
function delCat(id){state.cats=state.cats.filter(function(c){return c.id!==id;});saveDoc("cats",state.cats);var budget=state.budgets[state.user]||[];state.budgets[state.user]=budget.filter(function(b){return b.cat!==id;});saveDoc("bud-"+state.user,state.budgets[state.user]);renderTabContent();}
function addCat(){var icon=document.getElementById("nc-icon").value||"\u{1F4E6}",name=document.getElementById("nc-name").value.trim(),grp=document.getElementById("nc-group").value||"variable";if(!name)return;state.cats.push({id:name.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)+"_"+gid().slice(-3),label:name,icon:icon,group:grp});saveDoc("cats",state.cats);renderTabContent();}
function addWAccount(){var icon=document.getElementById("wa-icon").value||"\u{1F4B0}",name=document.getElementById("wa-name").value.trim();if(!name)return;var acc=state.wAccounts[state.user]||[];acc.push({id:"wa_"+gid().slice(-5),label:name,icon:icon});state.wAccounts[state.user]=acc;saveDoc("wacc-"+state.user,acc);renderTabContent();}
function editWAccount(id){var acc=state.wAccounts[state.user]||[],a=acc.find(function(x){return x.id===id;});if(!a)return;var ni=prompt("Icon/emoji:",a.icon);if(ni===null)return;var nn=prompt("Account name:",a.label);if(nn===null)return;a.icon=ni||a.icon;a.label=nn.trim()||a.label;state.wAccounts[state.user]=acc;saveDoc("wacc-"+state.user,acc);renderTabContent();}
function delWAccount(id){state.wAccounts[state.user]=(state.wAccounts[state.user]||[]).filter(function(x){return x.id!==id;});saveDoc("wacc-"+state.user,state.wAccounts[state.user]);renderTabContent();}

function monthPicker(){var p=state.month.split("-"),y=+p[0],m=+p[1];return'<div style="display:flex;align-items:center;gap:6px"><button class="mp-btn" onclick="changeMonth(-1)">\u25C0</button><span style="font-family:var(--fm);font-size:13px;min-width:80px;text-align:center">'+MS[m-1]+' '+y+'</span><button class="mp-btn" onclick="changeMonth(1)">\u25B6</button></div>';}
function changeMonth(dir){var p=state.month.split("-"),y=+p[0],m=+p[1];m+=dir;if(m>12){m=1;y++;}else if(m<1){m=12;y--;}state.month=y+"-"+String(m).padStart(2,"0");_cumCache={};renderTabContent();}

initApp();
var origRender=render;render=function(){origRender();setTimeout(renderTabContent,0);};
</script>
