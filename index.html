var firebaseConfig={apiKey:"AIzaSyCgGct_H34Sp8cJr4XamCzOLvvvCWL6Sn0",authDomain:"duobudget-a480f.firebaseapp.com",projectId:"duobudget-a480f",storageBucket:"duobudget-a480f.firebasestorage.app",messagingSenderId:"686450058537",appId:"1:686450058537:web:dca95ea7f52a7442228338"};
firebase.initializeApp(firebaseConfig);var db=firebase.firestore();var auth=firebase.auth();
var LISTENERS={};

function docRef(k){return db.collection("duobudget").doc(k);}
function loadDoc(k,fb){return docRef(k).get().then(function(s){return s.exists?s.data().value:fb;}).catch(function(){return fb;});}

function listenDoc(k,cb){if(LISTENERS[k])LISTENERS[k]();LISTENERS[k]=docRef(k).onSnapshot(function(s){if(s.exists)cb(s.data().value);});}

// State now includes freebies
var state={user:null,expenses:[],settlements:[],recurrings:[],cats:[],budgets:{},wealth:{},wAccounts:{},wTargets:{},freebies:[],tab:"add",month:getMonthKey(new Date()),loading:true};
var USERS=["Ivana","Adi"],MS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var GROUPS=[{id:"fix",label:"Fixed Costs"},{id:"variable",label:"Variable"},{id:"asset",label:"Assets"},{id:"saving",label:"Savings"}];

var DEFAULT_CATS=[{id:"rent",label:"Rent & Bills",icon:"\u{1F3E0}",group:"fix"},{id:"insurance",label:"Insurance",icon:"\u{1F6E1}",group:"fix"},{id:"abo",label:"Subscriptions",icon:"\u{1F4F1}",group:"fix"},{id:"bank",label:"Bank Fees",icon:"\u{1F3E6}",group:"fix"},{id:"groceries",label:"Groceries",icon:"\u{1F6D2}",group:"variable"},{id:"hygiene",label:"Hygiene",icon:"\u{1F9F4}",group:"variable"},{id:"clothes",label:"Clothes",icon:"\u{1F455}",group:"variable"},{id:"restaurant",label:"Restaurant",icon:"\u{1F37D}",group:"variable"},{id:"snacks",label:"Snacks & Caf\u00E9",icon:"\u2615",group:"variable"},{id:"fitness",label:"Fitness",icon:"\u{1F3CB}",group:"variable"},{id:"transport",label:"Transport",icon:"\u{1F686}",group:"variable"},{id:"health",label:"Health",icon:"\u{1F48A}",group:"variable"},{id:"shopping",label:"Shopping",icon:"\u{1F6CD}",group:"variable"},{id:"travel",label:"Travel",icon:"\u2708\uFE0F",group:"variable"},{id:"entertainment",label:"Entertainment",icon:"\u{1F3AC}",group:"variable"},{id:"stock",label:"Stock",icon:"\u{1F4C8}",group:"asset"},{id:"etf",label:"ETF",icon:"\u{1F4CA}",group:"asset"},{id:"vacation",label:"Vacation Fund",icon:"\u{1F334}",group:"saving"},{id:"gifts",label:"Gifts",icon:"\u{1F381}",group:"saving"},{id:"emergency",label:"Emergency Fund",icon:"\u{1F6A8}",group:"saving"},{id:"other",label:"Other",icon:"\u{1F4E6}",group:"variable"}];

var DEFAULT_WACC=[{id:"trStock",label:"Trade Republic Stock",icon:"\u{1F4C8}"},{id:"trMoney",label:"Trade Republic Money",icon:"\u{1F4B0}"},{id:"bank",label:"Bank",icon:"\u{1F3E6}"}];

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fe(n){return(typeof n==="number"?n:0).toLocaleString("de-DE",{style:"currency",currency:"EUR",minimumFractionDigits:2});}
function fes(n){return(typeof n==="number"?n:0).toLocaleString("de-DE",{maximumFractionDigits:0})+" \u20AC";}
function getMonthKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function prevMonth(mk){var p=mk.split("-"),y=+p[0],m=+p[1];m--;if(m<1){m=12;y--;}return y+"-"+String(m).padStart(2,"0");}
// Get Jan..currentMonth keys for current year (Story 1)
function getYearMonthKeys(){var now=new Date(),y=now.getFullYear(),cm=now.getMonth()+1,keys=[];for(var m=1;m<=cm;m++)keys.push(y+"-"+String(m).padStart(2,"0"));return keys;}

// Cumulative budget
var _cumCache={};
function getCumBudget(user,mk,catId){
  var key=user+"|"+mk+"|"+catId;if(_cumCache[key]!==undefined)return _cumCache[key];
  var budget=state.budgets[user]||DEFAULT_BUDGET;var bItem=budget.find(function(b){return b.cat===catId;});var monthly=bItem?bItem.monthly:0;
  if(monthly===0){_cumCache[key]=0;return 0;}
  var earliestMk=null;state.expenses.forEach(function(e){if(e.entryType==="income")return;var emk=getMonthKey(new Date(e.date));if(!earliestMk||emk<earliestMk)earliestMk=emk;});
  if(!earliestMk||mk<=earliestMk){_cumCache[key]=monthly;return monthly;}
  var pm=prevMonth(mk);var prevBudget=getCumBudget(user,pm,catId);var prevUsage=getMonthCatSpend(user,pm,catId);
  // Story 8: subtract paid-out freebies from usage (they add back to budget)
  var paidOutInMonth=0;state.freebies.forEach(function(f){if(f.addedBy===user&&f.status==="Paid out"&&f.paidMonth===pm)paidOutInMonth+=f.amount;});
  var result=monthly+(prevBudget-(prevUsage-paidOutInMonth));
  _cumCache[key]=result;return result;
}
function getMonthCatSpend(user,mk,catId){var t=0;state.expenses.forEach(function(e){if(getMonthKey(new Date(e.date))!==mk||e.entryType==="income"||e.category!==catId)return;if(e.type==="personal"&&e.addedBy!==user)return;t+=e.type==="personal"?e.amount:e.myShare;});return t;}
function getMonthTotalSpend(user,mk){var t=0;state.expenses.forEach(function(e){if(getMonthKey(new Date(e.date))!==mk||e.entryType==="income")return;if(e.type==="personal"&&e.addedBy!==user)return;t+=e.type==="personal"?e.amount:e.myShare;});return t;}
// Story 2: only variable+saving spend
function getMonthVarSavSpend(user,mk){var t=0;state.expenses.forEach(function(e){if(getMonthKey(new Date(e.date))!==mk||e.entryType==="income")return;if(e.type==="personal"&&e.addedBy!==user)return;var c=state.cats.find(function(x){return x.id===e.category;});if(!c||!(c.group==="variable"||c.group==="saving"))return;t+=e.type==="personal"?e.amount:e.myShare;});return t;}

function svgPie(slices,size){var r=size/2,cx=r,cy=r,total=0;slices.forEach(function(s){total+=s.value;});if(total===0)return'<div style="text-align:center;color:var(--dim);font-size:12px">No data</div>';var svg='<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';var sa=-Math.PI/2;slices.forEach(function(s){if(s.value<=0)return;var sl=(s.value/total)*2*Math.PI,ea=sa+sl,la=sl>Math.PI?1:0,x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);if(slices.filter(function(x){return x.value>0;}).length===1)svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+s.color+'"/>';else svg+='<path d="M'+cx+','+cy+' L'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+' 0 '+la+',1 '+x2.toFixed(2)+','+y2.toFixed(2)+' Z" fill="'+s.color+'"/>';sa=ea;});svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.55)+'" fill="var(--surface)"/>';svg+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="12" font-weight="700" font-family="var(--fm)" fill="var(--text)">'+fes(total)+'</text>';svg+='<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-size="9" fill="var(--dim)">Total</text></svg>';return svg;}

// Init — now loads freebies too
async function initApp(){
  try{var r=await Promise.all([loadDoc("expenses",[]),loadDoc("settlements",[]),loadDoc("recurrings",[]),loadDoc("cats",DEFAULT_CATS),loadDoc("bud-Ivana",DEFAULT_BUDGET),loadDoc("bud-Adi",DEFAULT_BUDGET),loadDoc("wlth-Ivana",[]),loadDoc("wlth-Adi",[]),loadDoc("wacc-Ivana",DEFAULT_WACC),loadDoc("wacc-Adi",DEFAULT_WACC),loadDoc("wtgt-Ivana",{yearEnd:50000,year:2026}),loadDoc("wtgt-Adi",{yearEnd:50000,year:2026}),loadDoc("freebies",[])]);
  state.expenses=r[0]||[];state.settlements=r[1]||[];state.recurrings=r[2]||[];state.cats=r[3]||DEFAULT_CATS;state.budgets={Ivana:r[4]||DEFAULT_BUDGET,Adi:r[5]||DEFAULT_BUDGET};state.wealth={Ivana:r[6]||[],Adi:r[7]||[]};state.wAccounts={Ivana:r[8]||DEFAULT_WACC,Adi:r[9]||DEFAULT_WACC};state.wTargets={Ivana:r[10]||{yearEnd:50000,year:2026},Adi:r[11]||{yearEnd:50000,year:2026}};state.freebies=r[12]||[];state.loading=false;
  listenDoc("expenses",function(v){state.expenses=v||[];_cumCache={};render();});listenDoc("settlements",function(v){state.settlements=v||[];render();});listenDoc("cats",function(v){state.cats=v||DEFAULT_CATS;render();});listenDoc("freebies",function(v){state.freebies=v||[];_cumCache={};render();});
  USERS.forEach(function(u){listenDoc("bud-"+u,function(v){state.budgets[u]=v||DEFAULT_BUDGET;_cumCache={};render();});listenDoc("wlth-"+u,function(v){state.wealth[u]=v||[];render();});listenDoc("wacc-"+u,function(v){state.wAccounts[u]=v||DEFAULT_WACC;render();});listenDoc("wtgt-"+u,function(v){state.wTargets[u]=v||{yearEnd:50000,year:2026};render();});});
  render();}catch(e){console.error(e);document.getElementById("app").innerHTML='<div class="loading-screen">Error connecting to Firebase.</div>';}}

function render(){var app=document.getElementById("app");if(state.loading){app.innerHTML='<div class="loading-screen">Loading...</div>';return;}if(!state.user){app.innerHTML=renderLogin();return;}app.innerHTML=renderShell();}
function renderLogin(){return'<div class="login-wrap"><div class="login-card"><div style="font-size:40px;margin-bottom:8px">\u{1F4B6}</div><h1 style="font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px">DuoBudget</h1><p style="font-size:13px;color:#8a8a8a;margin-bottom:24px">Budget \u00B7 Split \u00B7 Dashboard \u00B7 Wealth</p><div style="display:flex;gap:12px">'+USERS.map(function(u){return'<button class="login-btn" onclick="loginAs(\''+u+'\')"><span class="av">'+u.charAt(0)+'</span><span>'+u+'</span></button>';}).join("")+'</div></div></div>';}
// Story 3: removed Budget tab; Story 4,5: added Freebies tab
function renderShell(){var u=state.user,other=USERS.find(function(x){return x!==u;}),balance=calcBalance(u);var bt=balance===0?"Settled up with "+other+" \u2713":balance>0?other+" owes you "+fe(Math.abs(balance)):"You owe "+other+" "+fe(Math.abs(balance));var tabs=[{id:"add",label:"+ Add"},{id:"dashboard",label:"Dashboard"},{id:"split",label:"Split"},{id:"freebies",label:"Freebies"},{id:"wealth",label:"Wealth"},{id:"settings",label:"\u2699"}];return'<div class="shell"><header class="hdr"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">\u{1F4B6}</span><span style="font-weight:800;font-size:16px">DuoBudget</span></div><button class="badge" onclick="logout()"><span class="av av-sm">'+u.charAt(0)+'</span><span>'+u+'</span></button></header><div class="bal">'+bt+'</div><nav class="tabs">'+tabs.map(function(t){return'<button class="tab'+(state.tab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';}).join("")+'</nav><main class="main" id="tab-content"></main></div>';}
function calcBalance(u){var b=0;state.expenses.forEach(function(e){if(e.type!=="shared")return;if(e.paidBy===u)b+=(e.amount-e.myShare);else b-=e.myShare;});state.settlements.forEach(function(s){if(s.from===u)b+=s.amount;else if(s.to===u)b-=s.amount;});return b;}
function loginAs(u){state.user=u;state.tab="add";render();renderTabContent();}
function logout(){state.user=null;render();}
function switchTab(t){state.tab=t;render();renderTabContent();}
function renderTabContent(){var el=document.getElementById("tab-content");if(!el)return;var c="";if(state.tab==="add")c=renderAddTab();else if(state.tab==="dashboard")c=renderDashboardTab();else if(state.tab==="split")c=renderSplitTab();else if(state.tab==="freebies")c=renderFreebiesTab();else if(state.tab==="wealth")c=renderWealthTab();else if(state.tab==="settings")c=renderSettingsTab();el.innerHTML=c;}

  h+='<div class="card" style="padding:12px;margin-bottom:20px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add category</div><div style="display:flex;gap:6px;margin-bottom:8px"><input class="inp" id="nc-icon" style="width:50px;text-align:center" value="\u{1F4E6}"><input class="inp" id="nc-name" style="flex:1" placeholder="Name"><select class="inp" id="nc-group" style="width:100px"><option value="fix">Fixed</option><option value="variable" selected>Variable</option><option value="asset">Asset</option><option value="saving">Saving</option></select><button class="submit-btn" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="addCat()">+</button></div></div>';
  h+='<h3 class="sec-h">Monthly budget</h3><div class="card" style="padding:0;overflow:hidden;margin-bottom:14px"><table><thead><tr style="background:#f8f7f5"><th>Category</th><th style="text-align:right">Monthly</th><th style="text-align:right">%</th><th style="width:28px"></th></tr></thead><tbody>';
  budget.forEach(function(b){var c=state.cats.find(function(x){return x.id===b.cat;}),pct=totalBud>0?(b.monthly/totalBud*100):0;h+='<tr style="border-bottom:1px solid #f0eeeb"><td>'+(c?c.icon+" "+c.label:b.cat)+'</td><td style="text-align:right;padding:4px 10px"><input class="inp" type="number" value="'+b.monthly+'" onchange="updateBudget(\''+b.cat+'\',this.value)" style="width:80px;text-align:right;padding:4px 6px;font-size:12px" step="0.5"></td><td style="text-align:right;font-family:var(--fm);font-size:11px;color:var(--dim)">'+pct.toFixed(1)+'%</td><td><button class="del-btn" style="width:20px;height:20px;font-size:11px" onclick="updateBudget(\''+b.cat+'\',\'0\')">\u00D7</button></td></tr>';});
  h+='<tr style="background:#f8f7f5;font-weight:700"><td>Total</td><td style="text-align:right;font-family:var(--fm)">'+fe(totalBud)+'</td><td style="text-align:right;font-family:var(--fm);font-size:11px">100%</td><td></td></tr></tbody></table></div>';
  h+='<div class="card" style="padding:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add budget item</div><div style="display:flex;gap:6px;margin-bottom:8px"><select class="inp" id="bud-cat" style="flex:1" onchange="if(this.value){document.getElementById(\'bud-cat-free\').value=\'\';}"><option value="">Select existing...</option>';
  state.cats.filter(function(c){return!budget.some(function(b){return b.cat===c.id;});}).forEach(function(c){h+='<option value="'+c.id+'">'+c.icon+' '+c.label+'</option>';});
  h+='</select></div><div style="font-size:11px;color:var(--dim);margin-bottom:6px">Or type a new name:</div><div style="display:flex;gap:6px;margin-bottom:8px"><input class="inp" id="bud-cat-free" style="flex:1" placeholder="e.g. Pet expenses" oninput="if(this.value){document.getElementById(\'bud-cat\').value=\'\';}"><select class="inp" id="bud-cat-group" style="width:90px"><option value="fix">Fixed</option><option value="variable" selected>Variable</option><option value="asset">Asset</option><option value="saving">Saving</option></select></div><div style="display:flex;gap:6px"><input class="inp" id="bud-amt" type="number" style="width:100px;text-align:right" placeholder="Amount" step="0.5"><button class="submit-btn" style="flex:1;font-size:12px;padding:8px;margin-top:0" onclick="addBudgetItem()">Add budget item</button></div></div>';
  return h;
}

function saveTarget(){state.wTargets[state.user]={yearEnd:parseFloat(document.getElementById("set-yt").value)||0,year:parseInt(document.getElementById("set-yr").value)||2026};saveDoc("wtgt-"+state.user,state.wTargets[state.user]);renderTabContent();}
function updateBudget(catId,val){var amt=parseFloat(val)||0,budget=state.budgets[state.user]||[],ex=budget.findIndex(function(b){return b.cat===catId;});if(ex>=0){if(amt===0)budget.splice(ex,1);else budget[ex].monthly=amt;}else if(amt>0)budget.push({cat:catId,monthly:amt});state.budgets[state.user]=budget;saveDoc("bud-"+state.user,budget);_cumCache={};renderTabContent();}
function addBudgetItem(){var cat=document.getElementById("bud-cat").value,freeCat=document.getElementById("bud-cat-free").value.trim(),amt=document.getElementById("bud-amt").value;if(!amt)return;if(freeCat&&!cat){var grp=document.getElementById("bud-cat-group").value||"variable",existing=state.cats.find(function(c){return c.label.toLowerCase()===freeCat.toLowerCase();});if(existing)cat=existing.id;else{var newId=freeCat.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)+"_"+gid().slice(-3);state.cats.push({id:newId,label:freeCat,icon:"\u{1F4E6}",group:grp});saveDoc("cats",state.cats);cat=newId;}}if(cat&&amt)updateBudget(cat,amt);}
function editCat(id){var c=state.cats.find(function(x){return x.id===id;});if(!c)return;var ni=prompt("Icon/emoji for "+c.label+":",c.icon);if(ni===null)return;var nn=prompt("Category name:",c.label);if(nn===null)return;var ng=prompt("Group (fix/variable/asset/saving):",c.group);if(ng===null)ng=c.group;if(!["fix","variable","asset","saving"].includes(ng))ng=c.group;c.icon=ni||c.icon;c.label=nn.trim()||c.label;c.group=ng;saveDoc("cats",state.cats);renderTabContent();}
function delCat(id){state.cats=state.cats.filter(function(c){return c.id!==id;});saveDoc("cats",state.cats);var budget=state.budgets[state.user]||[];state.budgets[state.user]=budget.filter(function(b){return b.cat!==id;});saveDoc("bud-"+state.user,state.budgets[state.user]);renderTabContent();}
function addCat(){var icon=document.getElementById("nc-icon").value||"\u{1F4E6}",name=document.getElementById("nc-name").value.trim(),grp=document.getElementById("nc-group").value||"variable";if(!name)return;state.cats.push({id:name.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)+"_"+gid().slice(-3),label:name,icon:icon,group:grp});saveDoc("cats",state.cats);renderTabContent();}
function addWAccount(){var icon=document.getElementById("wa-icon").value||"\u{1F4B0}",name=document.getElementById("wa-name").value.trim();if(!name)return;var acc=state.wAccounts[state.user]||[];acc.push({id:"wa_"+gid().slice(-5),label:name,icon:icon});state.wAccounts[state.user]=acc;saveDoc("wacc-"+state.user,acc);renderTabContent();}
function editWAccount(id){var acc=state.wAccounts[state.user]||[],a=acc.find(function(x){return x.id===id;});if(!a)return;var ni=prompt("Icon/emoji:",a.icon);if(ni===null)return;var nn=prompt("Account name:",a.label);if(nn===null)return;a.icon=ni||a.icon;a.label=nn.trim()||a.label;state.wAccounts[state.user]=acc;saveDoc("wacc-"+state.user,acc);renderTabContent();}
function delWAccount(id){state.wAccounts[state.user]=(state.wAccounts[state.user]||[]).filter(function(x){return x.id!==id;});saveDoc("wacc-"+state.user,state.wAccounts[state.user]);renderTabContent();}

function monthPicker(){var p=state.month.split("-"),y=+p[0],m=+p[1];return'<div style="display:flex;align-items:center;gap:6px"><button class="mp-btn" onclick="changeMonth(-1)">\u25C0</button><span style="font-family:var(--fm);font-size:13px;min-width:80px;text-align:center">'+MS[m-1]+' '+y+'</span><button class="mp-btn" onclick="changeMonth(1)">\u25B6</button></div>';}
function changeMonth(dir){var p=state.month.split("-"),y=+p[0],m=+p[1];m+=dir;if(m>12){m=1;y++;}else if(m<1){m=12;y--;}state.month=y+"-"+String(m).padStart(2,"0");_cumCache={};renderTabContent();}

initApp();
var origRender=render;render=function(){origRender();setTimeout(renderTabContent,0);};
</script>
</body>
