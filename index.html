<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf9f7;--surface:#fff;--border:#e8e5e0;--text:#1a1a1a;--dim:#999;--accent:#1e3a5f;--green:#16a34a;--red:#dc2626;--purple:#7c3aed;--teal:#0d9488;--ff:'DM Sans',system-ui,sans-serif;--fm:'JetBrains Mono',monospace}
body{font-family:var(--ff);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;outline:none}
.shell{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:60px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.badge{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 10px 3px 3px;font-size:12px;cursor:pointer}
.av{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.av-sm{width:24px;height:24px;font-size:11px}
.bal{padding:10px 16px;font-size:12px;background:var(--surface);border-bottom:1px solid var(--border);text-align:center;font-weight:500}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:1 0 auto;padding:10px 4px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:500;cursor:pointer;color:var(--dim);white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.main{padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.sec-title{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.kpi{display:grid;gap:8px;margin-bottom:14px}
.kpi-2{grid-template-columns:1fr 1fr}.kpi-3{grid-template-columns:1fr 1fr 1fr}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px}
.kpi-label{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:0.5px;margin-bottom:2px}
.kpi-val{font-size:16px;font-weight:800;font-family:var(--fm);letter-spacing:-0.5px}
.kpi-sub{font-size:10px;color:#aaa;margin-top:2px}
.toggle-row{display:flex;gap:6px;margin-bottom:12px}
.toggle-btn{flex:1;padding:9px 0;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;cursor:pointer}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toggle-btn.active-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.toggle-btn.active-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.toggle-btn.active-green{background:var(--green);color:#fff;border-color:var(--green)}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--dim);margin-bottom:4px;letter-spacing:0.5px}
.inp{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:var(--surface)}
.inp-big{font-size:22px;font-weight:700;font-family:var(--fm);padding:10px 12px}
.pill{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:16px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;white-space:nowrap}
.pill.active{border-color:var(--accent);background:#eef2f7;font-weight:600}
.qp{padding:8px 14px;border-radius:20px;border:2px solid var(--border);font-size:12px;font-weight:600}
.qp.active{border-color:var(--accent);background:#eef2f7;color:var(--accent)}
.submit-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0eeeb}
.tx-desc{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{font-size:10px;color:var(--dim);margin-top:1px}
.tx-amt{font-size:13px;font-weight:600;font-family:var(--fm)}
.del-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:13px;color:#aaa;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:36px;color:var(--dim);font-size:13px}
.toast{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600;z-index:20}
.shared-box{background:#f5f3ff;border:1px solid #e0d9f9;border-radius:10px;padding:12px;margin-bottom:12px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;text-align:center;max-width:340px;width:100%}
.login-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:8px 10px;font-size:11px;font-weight:600;color:var(--dim);text-align:left;letter-spacing:0.3px}
td{padding:7px 10px}
.mp-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--dim);padding:3px 6px}
.sec-h{font-size:14px;font-weight:700;margin:16px 0 10px}
.alloc-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;margin-bottom:8px}
.alloc-row{display:flex;align-items:center;gap:6px;font-size:11px}
.alloc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.progress-bar{height:12px;background:#f0eeeb;border-radius:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width 0.4s}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:14px;color:var(--dim)}
</style>
</head>
<body>
<div
 id="app"><div class="loading-screen">Loading DuoBudget...</div></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  PASTE YOUR FIREBASE CONFIG HERE                            ║
// ╚══════════════════════════════════════════════════════════════╝
var firebaseConfig = {
  apiKey: "AIzaSyCgGct_H34Sp8cJr4XamCzOLvvvCWL6Sn0",
  authDomain: "duobudget-a480f.firebaseapp.com",
  projectId: "duobudget-a480f",
  storageBucket: "duobudget-a480f.firebasestorage.app",
  messagingSenderId: "686450058537",
  appId: "1:686450058537:web:dca95ea7f52a7442228338"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// ── Data Layer ────────────────────────────────────────────────
var DATA = {};
var LISTENERS = {};

function docRef(key) { return db.collection("duobudget").doc(key); }

function loadDoc(key, fallback) {
  return docRef(key).get().then(function(snap) {
    return snap.exists ? snap.data().value : fallback;
  }).catch(function() { return fallback; });
}

function saveDoc(key, value) {
  return docRef(key).set({ value: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
}

function listenDoc(key, callback) {
  if (LISTENERS[key]) LISTENERS[key]();
  LISTENERS[key] = docRef(key).onSnapshot(function(snap) {
    if (snap.exists) callback(snap.data().value);
  });
}

// ── App State ─────────────────────────────────────────────────
var state = {
  user: null,
  expenses: [],
  settlements: [],
  recurrings: [],
  cats: [],
  budgets: {},
  wealth: {},
  wAccounts: {},
  wTargets: {},
  tab: "add",
  month: getMonthKey(new Date()),
  loading: true,
};

// ── Constants ─────────────────────────────────────────────────
var USERS = ["Ivana", "Adi"];
var MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var GROUPS = [{id:"fix",label:"Fixed Costs"},{id:"variable",label:"Variable"},{id:"asset",label:"Assets"},{id:"saving",label:"Savings"}];

var DEFAULT_CATS = [
  {id:"rent",label:"Rent & Bills",icon:"\u{1F3E0}",group:"fix"},{id:"insurance",label:"Insurance",icon:"\u{1F6E1}",group:"fix"},
  {id:"abo",label:"Subscriptions",icon:"\u{1F4F1}",group:"fix"},{id:"bank",label:"Bank Fees",icon:"\u{1F3E6}",group:"fix"},
  {id:"groceries",label:"Groceries",icon:"\u{1F6D2}",group:"variable"},{id:"hygiene",label:"Hygiene",icon:"\u{1F9F4}",group:"variable"},
  {id:"clothes",label:"Clothes",icon:"\u{1F455}",group:"variable"},{id:"restaurant",label:"Restaurant",icon:"\u{1F37D}",group:"variable"},
  {id:"snacks",label:"Snacks & Caf\u00E9",icon:"\u2615",group:"variable"},{id:"fitness",label:"Fitness",icon:"\u{1F3CB}",group:"variable"},
  {id:"transport",label:"Transport",icon:"\u{1F686}",group:"variable"},{id:"health",label:"Health",icon:"\u{1F48A}",group:"variable"},
  {id:"shopping",label:"Shopping",icon:"\u{1F6CD}",group:"variable"},{id:"travel",label:"Travel",icon:"\u2708\uFE0F",group:"variable"},
  {id:"entertainment",label:"Entertainment",icon:"\u{1F3AC}",group:"variable"},
  {id:"stock",label:"Stock",icon:"\u{1F4C8}",group:"asset"},{id:"etf",label:"ETF",icon:"\u{1F4CA}",group:"asset"},
  {id:"vacation",label:"Vacation Fund",icon:"\u{1F334}",group:"saving"},{id:"gifts",label:"Gifts",icon:"\u{1F381}",group:"saving"},
  {id:"emergency",label:"Emergency Fund",icon:"\u{1F6A8}",group:"saving"},{id:"other",label:"Other",icon:"\u{1F4E6}",group:"variable"},
];

var DEFAULT_BUDGET = [
  {cat:"rent",monthly:804},{cat:"abo",monthly:20},{cat:"bank",monthly:13.5},{cat:"insurance",monthly:20},
  {cat:"stock",monthly:1200},{cat:"etf",monthly:500},{cat:"groceries",monthly:250},{cat:"hygiene",monthly:70},
  {cat:"clothes",monthly:70},{cat:"restaurant",monthly:60},{cat:"snacks",monthly:10},{cat:"fitness",monthly:5},
  {cat:"vacation",monthly:300},{cat:"gifts",monthly:50},{cat:"emergency",monthly:127.5},
];

var DEFAULT_WACC = [{id:"trStock",label:"Trade Republic Stock",icon:"\u{1F4C8}"},{id:"trMoney",label:"Trade Republic Money",icon:"\u{1F4B0}"},{id:"bank",label:"Bank",icon:"\u{1F3E6}"}];

// ── Helpers ───────────────────────────────────────────────────
function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function fe(n) { return (typeof n === "number" ? n : 0).toLocaleString("de-DE", { style: "currency", currency: "EUR", minimumFractionDigits: 2 }); }
function fes(n) { return (typeof n === "number" ? n : 0).toLocaleString("de-DE", { maximumFractionDigits: 0 }) + " \u20AC"; }
function getMonthKey(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); }

// ── Init ──────────────────────────────────────────────────────
async function initApp() {
  try {
    var results = await Promise.all([
      loadDoc("expenses", []),
      loadDoc("settlements", []),
      loadDoc("recurrings", []),
      loadDoc("cats", DEFAULT_CATS),
      loadDoc("bud-Ivana", DEFAULT_BUDGET),
      loadDoc("bud-Adi", DEFAULT_BUDGET),
      loadDoc("wlth-Ivana", []),
      loadDoc("wlth-Adi", []),
      loadDoc("wacc-Ivana", DEFAULT_WACC),
      loadDoc("wacc-Adi", DEFAULT_WACC),
      loadDoc("wtgt-Ivana", { yearEnd: 50000, year: 2026 }),
      loadDoc("wtgt-Adi", { yearEnd: 50000, year: 2026 }),
    ]);

    state.expenses = results[0] || [];
    state.settlements = results[1] || [];
    state.recurrings = results[2] || [];
    state.cats = results[3] || DEFAULT_CATS;
    state.budgets = { Ivana: results[4] || DEFAULT_BUDGET, Adi: results[5] || DEFAULT_BUDGET };
    state.wealth = { Ivana: results[6] || [], Adi: results[7] || [] };
    state.wAccounts = { Ivana: results[8] || DEFAULT_WACC, Adi: results[9] || DEFAULT_WACC };
    state.wTargets = { Ivana: results[10] || { yearEnd: 50000, year: 2026 }, Adi: results[11] || { yearEnd: 50000, year: 2026 } };
    state.loading = false;

    // Set up real-time listeners
    listenDoc("expenses", function(v) { state.expenses = v || []; render(); });
    listenDoc("settlements", function(v) { state.settlements = v || []; render(); });
    listenDoc("cats", function(v) { state.cats = v || DEFAULT_CATS; render(); });
    USERS.forEach(function(u) {
      listenDoc("bud-" + u, function(v) { state.budgets[u] = v || DEFAULT_BUDGET; render(); });
      listenDoc("wlth-" + u, function(v) { state.wealth[u] = v || []; render(); });
      listenDoc("wacc-" + u, function(v) { state.wAccounts[u] = v || DEFAULT_WACC; render(); });
      listenDoc("wtgt-" + u, function(v) { state.wTargets[u] = v || { yearEnd: 50000, year: 2026 }; render(); });
    });

    render();
  } catch (e) {
    console.error("Init error:", e);
    document.getElementById("app").innerHTML = '<div class="loading-screen">Error connecting to Firebase. Check your config.</div>';
  }
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  var app = document.getElementById("app");
  if (state.loading) {
    app.innerHTML = '<div class="loading-screen">Loading DuoBudget...</div>';
    return;
  }
  if (!state.user) {
    app.innerHTML = renderLogin();
    return;
  }
  app.innerHTML = renderShell();
}

function renderLogin() {
  return '<div class="login-wrap"><div class="login-card">' +
    '<div style="font-size:40px;margin-bottom:8px">\u{1F4B6}</div>' +
    '<h1 style="font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px">DuoBudget</h1>' +
    '<p style="font-size:13px;color:#8a8a8a;margin-bottom:24px">Budget \u00B7 Split \u00B7 Dashboard \u00B7 Wealth</p>' +
    '<div style="display:flex;gap:12px">' +
    USERS.map(function(u) {
      return '<button class="login-btn" onclick="loginAs(\'' + u + '\')">' +
        '<span class="av">' + u.charAt(0) + '</span><span>' + u + '</span></button>';
    }).join("") +
    '</div></div></div>';
}

function renderShell() {
  var u = state.user;
  var other = USERS.find(function(x) { return x !== u; });
  var balance = calcBalance(u);
  var balText = balance === 0 ? "Settled up with " + other + " \u2713" :
    balance > 0 ? other + " owes you " + fe(Math.abs(balance)) :
    "You owe " + other + " " + fe(Math.abs(balance));

  var tabs = [{id:"add",label:"+ Add"},{id:"budget",label:"Budget"},{id:"dashboard",label:"Dashboard"},{id:"split",label:"Split"},{id:"wealth",label:"Wealth"},{id:"settings",label:"\u2699"}];

  return '<div class="shell">' +
    '<header class="hdr"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">\u{1F4B6}</span><span style="font-weight:800;font-size:16px">DuoBudget</span></div>' +
    '<button class="badge" onclick="logout()"><span class="av av-sm">' + u.charAt(0) + '</span><span>' + u + '</span></button></header>' +
    '<div class="bal">' + balText + '</div>' +
    '<nav class="tabs">' + tabs.map(function(t) {
      return '<button class="tab' + (state.tab === t.id ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</button>';
    }).join("") + '</nav>' +
    '<main class="main" id="tab-content"></main></div>';
}

function calcBalance(user) {
  var balance = 0;
  state.expenses.forEach(function(e) {
    if (e.type !== "shared") return;
    if (e.paidBy === user) balance += (e.amount - e.myShare);
    else balance -= e.myShare;
  });
  state.settlements.forEach(function(s) {
    if (s.from === user) balance += s.amount;
    else if (s.to === user) balance -= s.amount;
  });
  return balance;
}

// ── Actions ───────────────────────────────────────────────────
function loginAs(u) { state.user = u; state.tab = "add"; render(); renderTabContent(); }
function logout() { state.user = null; render(); }
function switchTab(t) { state.tab = t; render(); renderTabContent(); }

function renderTabContent() {
  var el = document.getElementById("tab-content");
  if (!el) return;

  // For now, show a helpful message directing users to the Claude artifact version
  // The full tab rendering would be implemented here following the same patterns
  var content = "";

  if (state.tab === "add") {
    content = renderAddTab();
  } else if (state.tab === "budget") {
    content = renderBudgetTab();
  } else if (state.tab === "dashboard") {
    content = renderDashboardTab();
  } else if (state.tab === "split") {
    content = renderSplitTab();
  } else if (state.tab === "wealth") {
    content = renderWealthTab();
  } else if (state.tab === "settings") {
    content = renderSettingsTab();
  }

  el.innerHTML = content;
}

// ── Add Tab ───────────────────────────────────────────────────
var addState = { mode: "expense", type: "personal", cat: "groceries", split: "equal", paidBy: "", rInt: "monthly" };

function renderAddTab() {
  var u = state.user;
  var other = USERS.find(function(x) { return x !== u; });
  if (!addState.paidBy) addState.paidBy = u;

  // Top 5
  var freq = {};
  state.expenses.forEach(function(e) { if (e.addedBy === u && e.entryType !== "income") freq[e.category] = (freq[e.category] || 0) + 1; });
  var top5 = Object.entries(freq).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5).map(function(x) { return x[0]; });

  var html = '<div style="position:relative" id="add-form">';

  // Mode toggle
  html += '<div class="toggle-row">' +
    '<button class="toggle-btn' + (addState.mode === "expense" ? " active" : "") + '" onclick="addState.mode=\'expense\';renderTabContent()">Expense</button>' +
    '<button class="toggle-btn' + (addState.mode === "recurring" ? " active-teal" : "") + '" onclick="addState.mode=\'recurring\';renderTabContent()">Recurring \u{1F504}</button>' +
    '<button class="toggle-btn' + (addState.mode === "income" ? " active-green" : "") + '" onclick="addState.mode=\'income\';renderTabContent()">Income \u{1F4B5}</button></div>';

  // Type toggle (not for income)
  if (addState.mode !== "income") {
    html += '<div class="toggle-row">' +
      '<button class="toggle-btn' + (addState.type === "personal" ? " active" : "") + '" onclick="addState.type=\'personal\';renderTabContent()">Personal</button>' +
      '<button class="toggle-btn' + (addState.type === "shared" ? " active-purple" : "") + '" onclick="addState.type=\'shared\';renderTabContent()">Shared</button></div>';
  }

  html += '<div class="field"><label>AMOUNT (EUR)</label><input class="inp inp-big" type="number" id="add-amt" placeholder="0.00" step="0.01" min="0"></div>';
  html += '<div class="field"><label>' + (addState.mode === "income" ? "SOURCE (OPTIONAL)" : "DESCRIPTION (OPTIONAL)") + '</label><input class="inp" id="add-desc" placeholder="' + (addState.mode === "income" ? "e.g. Salary" : "Auto-fills from category") + '"></div>';

  // Categories (not for income)
  if (addState.mode !== "income") {
    if (top5.length > 0) {
      html += '<div class="field"><label>QUICK PICK (TOP 5)</label><div style="display:flex;flex-wrap:wrap;gap:6px">';
      top5.forEach(function(cid) {
        var c = state.cats.find(function(x) { return x.id === cid; });
        if (c) html += '<button class="qp' + (addState.cat === cid ? " active" : "") + '" onclick="addState.cat=\'' + cid + '\';renderTabContent()">' + c.icon + " " + c.label + '</button>';
      });
      html += '</div></div>';
    }

    html += '<div class="field"><label>CATEGORY</label>';
    GROUPS.forEach(function(g) {
      var gc = state.cats.filter(function(c) { return c.group === g.id; });
      if (!gc.length) return;
      html += '<div style="margin-bottom:6px"><div style="font-size:10px;color:#aaa;font-weight:600;margin-bottom:3px">' + g.label + '</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
      gc.forEach(function(c) {
        html += '<button class="pill' + (addState.cat === c.id ? " active" : "") + '" onclick="addState.cat=\'' + c.id + '\';renderTabContent()">' + c.icon + " " + c.label + '</button>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  }

  html += '<div class="field"><label>' + (addState.mode === "recurring" ? "START DATE" : "DATE") + '</label><input class="inp" type="date" id="add-date" value="' + new Date().toISOString().slice(0, 10) + '"></div>';

  // Recurring fields
  if (addState.mode === "recurring") {
    html += '<div style="background:#f0fdfa;border:1px solid #99f6e4;border-radius:10px;padding:12px;margin-bottom:12px">' +
      '<div class="field"><label>REPEAT</label><div class="toggle-row">';
    ["daily", "weekly", "monthly", "yearly"].forEach(function(iv) {

function submitExpense() {
  var amt = parseFloat(document.getElementById("add-amt").value);
  if (isNaN(amt) || amt <= 0) return;
  var desc = document.getElementById("add-desc").value.trim();
  var date = document.getElementById("add-date").value;
  var u = state.user;
  var other = USERS.find(function(x) { return x !== u; });

  if (addState.mode === "income") {
    var entry = { id: gid(), desc: desc || "Income", amount: amt, category: "income", type: "personal", paidBy: u, splitMode: "none", myShare: amt, date: date, addedBy: u, entryType: "income" };
    state.expenses.push(entry);
    saveDoc("expenses", state.expenses);
  } else {
    var myShare = amt;
    if (addState.type === "shared") {
      if (addState.split === "equal") myShare = amt / 2;
      else { var ce = document.getElementById("add-custom"); myShare = ce ? parseFloat(ce.value) || 0 : amt / 2; }
    }
    var label = desc || (state.cats.find(function(c) { return c.id === addState.cat; }) || {}).label || addState.cat;
    var entry = { id: gid(), desc: label, amount: amt, category: addState.cat, type: addState.type, paidBy: addState.type === "shared" ? addState.paidBy : u, splitMode: addState.split, myShare: myShare, date: date, addedBy: u };
    state.expenses.push(entry);
    saveDoc("expenses", state.expenses);
  }

  // Reset form
  document.getElementById("add-amt").value = "";
  document.getElementById("add-desc").value = "";

  // Show toast
  var form = document.getElementById("add-form");
  var t = document.createElement("div");
  t.className = "toast";
  t.textContent = "Added! \u2713";
  form.prepend(t);
  setTimeout(function() { t.remove(); }, 1800);
}

      html += '<div class="alloc-row"><span class="alloc-dot" style="background:' + a.color + '"></span><span style="color:#666;flex:1">' + a.label + '</span><span style="font-family:var(--fm);font-weight:600">' + pct.toFixed(1) + '%</span><span style="font-family:var(--fm);color:#999;font-size:10px">' + fes(a.val) + '</span></div>';
    });
    html += '<div class="alloc-row" style="grid-column:1/-1;border-top:1px solid #f0eeeb;padding-top:4px;margin-top:2px"><span class="alloc-dot" style="background:#e8e5e0"></span><span style="color:#666;flex:1">Remaining</span><span style="font-family:var(--fm);font-weight:600;color:' + (remaining >= 0 ? "var(--green)" : "var(--red)") + '">' + (totalIncome > 0 ? (remaining / totalIncome * 100).toFixed(1) : 0) + '%</span><span style="font-family:var(--fm);color:#999;font-size:10px">' + fes(remaining) + '</span></div>';
    html += '</div></div>';
  }

  // Budget usage
  html += '<div class="card" style="margin-bottom:14px;padding:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--dim)">Budget Usage</span><span style="font-weight:600;font-family:var(--fm)">' + (totalBudget > 0 ? (totalSpent / totalBudget * 100).toFixed(0) + "%" : "--") + '</span></div><div class="progress-bar"><div class="progress-fill" style="background:' + (totalSpent > totalBudget ? "var(--red)" : "var(--accent)") + ';width:' + Math.min(totalBudget > 0 ? totalSpent / totalBudget * 100 : 0, 100) + '%"></div></div></div>';

  // Budget table
  var tRows = [];
  GROUPS.forEach(function(g) {
    state.cats.filter(function(c) { return c.group === g.id; }).forEach(function(c) {
      var bA = catBudget[c.id] || 0; var sA = catSpend[c.id] || 0;

  tRows.forEach(function(r) {

  });
  html += '<tr style="background:#f8f7f5;font-weight:700"><td>Total</td><td style="text-align:right;font-family:var(--fm)">' + fe(totalBudget) + '</td><td style="text-align:right;font-family:var(--fm)">' + fe(totalSpent) + '</td><td style="text-align:right;font-family:var(--fm);color:' + (totalSpent > totalBudget ? "var(--red)" : "var(--green)") + '">' + fe(totalBudget - totalSpent) + '</td><td style="text-align:right"><span style="font-size:10px;font-family:var(--fm)">' + (totalBudget > 0 ? (totalSpent / totalBudget * 100).toFixed(0) + "%" : "--") + '</span></td></tr>';
  html += '</tbody></table></div></div>';
  return html;

  var accounts = state.wAccounts[state.user] || DEFAULT_WACC;
  var html = '<div class="card" style="padding:14px;margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Add / Update Snapshot</div>';
  html += '<div class="field"><label>MONTH</label><input class="inp" type="month" id="w-month" value="' + getMonthKey(new Date()) + '"></div>';
  accounts.forEach(function(a) {
    html += '<div class="field"><label>' + a.icon + ' ' + a.label.toUpperCase() + '</label><input class="inp" type="number" id="w-' + a.id + '" placeholder="0"></div>';
  });
  html += '<div style="display:flex;gap:8px"><button class="submit-btn" style="flex:1" onclick="saveWealth()">Save</button><button class="submit-btn" style="flex:1;background:#94a3b8" onclick="document.getElementById(\'wealth-form\').innerHTML=\'\'">Cancel</button></div></div>';
  el.innerHTML = html;
}

function saveWealth() {
  var month = document.getElementById("w-month").value;
  if (!month) return;
  var accounts = state.wAccounts[state.user] || DEFAULT_WACC;
  var entry = { month: month, values: {} };
  accounts.forEach(function(a) {
    var el = document.getElementById("w-" + a.id);
    entry.values[a.id] = el ? parseFloat(el.value) || 0 : 0;
  });
  var w = state.wealth[state.user] || [];
  var ex = w.findIndex(function(x) { return x.month === month; });
  if (ex >= 0) w[ex] = entry; else w.push(entry);
  state.wealth[state.user] = w;
  saveDoc("wlth-" + state.user, w);
  renderTabContent();
}

function delWealth(mo) {
  var w = (state.wealth[state.user] || []).filter(function(x) { return x.month !== mo; });
  state.wealth[state.user] = w;
  saveDoc("wlth-" + state.user, w);
  renderTabContent();
}

// ── Settings Tab ──────────────────────────────────────────────
function renderSettingsTab() {
  var u = state.user;
  var budget = state.budgets[u] || DEFAULT_BUDGET;
  var totalBud = 0; budget.forEach(function(b) { totalBud += b.monthly; });
  var wTargets = state.wTargets[u] || { yearEnd: 50000, year: 2026 };
  var wAccounts = state.wAccounts[u] || DEFAULT_WACC;

  var html = '<h2 class="sec-title">Settings</h2><div style="font-size:12px;color:var(--dim);margin-bottom:16px">Editing as: ' + u + '</div>';

  // Year target
  html += '<h3 class="sec-h">Year-End Wealth Target</h3><div class="card" style="padding:14px;margin-bottom:20px"><div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1"><div class="field"><label>YEAR</label><input class="inp" type="number" id="set-yr" value="' + (wTargets.year || 2026) + '"></div></div><div style="flex:2"><div class="field"><label>TARGET (\u20AC)</label><input class="inp" type="number" id="set-yt" value="' + (wTargets.yearEnd || 50000) + '" step="1000"></div></div></div><div style="font-size:11px;color:var(--dim);margin-bottom:8px">Monthly = (Target \u2212 Start Wealth) \u00F7 12</div><button class="submit-btn" style="font-size:12px;padding:8px" onclick="saveTarget()">Save</button></div>';

  // Wealth accounts
  html += '<h3 class="sec-h">Wealth Accounts</h3><div style="margin-bottom:20px">';
  wAccounts.forEach(function(a) {
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0eeeb"><span style="font-size:13px">' + a.icon + ' ' + a.label + '</span><div style="display:flex;gap:4px"><button class="del-btn" style="font-size:10px;width:32px;height:24px;border-radius:6px" onclick="editWAccount(\'' + a.id + '\')">Edit</button><button class="del-btn" style="width:24px;height:24px" onclick="delWAccount(\'' + a.id + '\')">\u00D7</button></div></div>';
  });
  html += '<div class="card" style="padding:12px;margin-top:8px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add Account</div><div style="display:flex;gap:6px"><input class="inp" id="wa-icon" style="width:50px;text-align:center" placeholder="\u{1F4B0}" value="\u{1F4B0}"><input class="inp" id="wa-name" style="flex:1" placeholder="e.g. Scalable"><button class="submit-btn" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="addWAccount()">+</button></div></div></div>';

  // Budget table
  html += '<h3 class="sec-h">Monthly Budget</h3><div class="card" style="padding:0;overflow:hidden;margin-bottom:14px"><table><thead><tr style="background:#f8f7f5"><th>Category</th><th style="text-align:right">Monthly</th><th style="text-align:right">%</th><th style="width:28px"></th></tr></thead><tbody>';
  budget.forEach(function(b) {
    var c = state.cats.find(function(x) { return x.id === b.cat; });
    var pct = totalBud > 0 ? (b.monthly / totalBud * 100) : 0;
    html += '<tr style="border-bottom:1px solid #f0eeeb"><td>' + (c ? c.icon + " " + c.label : b.cat) + '</td><td style="text-align:right;padding:4px 10px"><input class="inp" type="number" value="' + b.monthly + '" onchange="updateBudget(\'' + b.cat + '\',this.value)" style="width:80px;text-align:right;padding:4px 6px;font-size:12px" step="0.5"></td><td style="text-align:right;font-family:var(--fm);font-size:11px;color:var(--dim)">' + pct.toFixed(1) + '%</td><td><button class="del-btn" style="width:20px;height:20px;font-size:11px" onclick="updateBudget(\'' + b.cat + '\',\'0\')">\u00D7</button></td></tr>';
  });
  html += '<tr style="background:#f8f7f5;font-weight:700"><td>Total</td><td style="text-align:right;font-family:var(--fm)">' + fe(totalBud) + '</td><td style="text-align:right;font-family:var(--fm);font-size:11px">100%</td><td></td></tr></tbody></table></div>';

  // Add budget item
  html += '<div class="card" style="padding:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Add Budget Item</div><div style="display:flex;gap:6px"><select class="inp" id="bud-cat" style="flex:1"><option value="">Select...</option>';
  state.cats.filter(function(c) { return !budget.some(function(b) { return b.cat === c.id; }); }).forEach(function(c) {
    html += '<option value="' + c.id + '">' + c.icon + ' ' + c.label + '</option>';
  });
  html += '</select><input class="inp" id="bud-amt" type="number" style="width:80px;text-align:right" placeholder="0" step="0.5"><button class="submit-btn" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="addBudgetItem()">+</button></div></div>';

  return html;
}

function saveTarget() {
  var yr = parseInt(document.getElementById("set-yr").value) || 2026;
  var yt = parseFloat(document.getElementById("set-yt").value) || 0;
  state.wTargets[state.user] = { yearEnd: yt, year: yr };
  saveDoc("wtgt-" + state.user, state.wTargets[state.user]);
  renderTabContent();
}

function updateBudget(catId, val) {
  var amt = parseFloat(val) || 0;
  var budget = state.budgets[state.user] || [];
  var ex = budget.findIndex(function(b) { return b.cat === catId; });
  if (ex >= 0) { if (amt === 0) budget.splice(ex, 1); else budget[ex].monthly = amt; }
  else if (amt > 0) budget.push({ cat: catId, monthly: amt });
  state.budgets[state.user] = budget;
  saveDoc("bud-" + state.user, budget);
  renderTabContent();
}

function addBudgetItem() {
  var cat = document.getElementById("bud-cat").value;
  var amt = document.getElementById("bud-amt").value;
  if (cat && amt) { updateBudget(cat, amt); }
}

function addWAccount() {
  var icon = document.getElementById("wa-icon").value || "\u{1F4B0}";
  var name = document.getElementById("wa-name").value.trim();
  if (!name) return;
  var acc = state.wAccounts[state.user] || [];
  acc.push({ id: "wa_" + gid().slice(-5), label: name, icon: icon });
  state.wAccounts[state.user] = acc;
  saveDoc("wacc-" + state.user, acc);
  renderTabContent();
}

function editWAccount(id) {
  var acc = state.wAccounts[state.user] || [];
  var a = acc.find(function(x) { return x.id === id; });
  if (!a) return;
  var newName = prompt("Account name:", a.label);
  if (newName === null) return;
  var newIcon = prompt("Icon:", a.icon);
  if (newIcon === null) newIcon = a.icon;
  a.label = newName.trim() || a.label;
  a.icon = newIcon || a.icon;
  state.wAccounts[state.user] = acc;
  saveDoc("wacc-" + state.user, acc);
  renderTabContent();
}

function delWAccount(id) {
  var acc = (state.wAccounts[state.user] || []).filter(function(x) { return x.id !== id; });
  state.wAccounts[state.user] = acc;
  saveDoc("wacc-" + state.user, acc);
  renderTabContent();
}

// ── Month Picker ──────────────────────────────────────────────
function monthPicker() {
  var p = state.month.split("-"); var y = parseInt(p[0]); var m = parseInt(p[1]);
  return '<div style="display:flex;align-items:center;gap:6px"><button class="mp-btn" onclick="changeMonth(-1)">\u25C0</button><span style="font-family:var(--fm);font-size:13px;min-width:80px;text-align:center">' + MS[m - 1] + ' ' + y + '</span><button class="mp-btn" onclick="changeMonth(1)">\u25B6</button></div>';
}

function changeMonth(dir) {
  var p = state.month.split("-"); var y = parseInt(p[0]); var m = parseInt(p[1]);
  m += dir;
  if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
  state.month = y + "-" + String(m).padStart(2, "0");
  renderTabContent();
}

// ── Boot ──────────────────────────────────────────────────────
initApp();

// Re-render tab content after shell renders
var origRender = render;
render = function() { origRender(); setTimeout(renderTabContent, 0); };
</script>
</body>
</html>
